<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>無言パズル５マス</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --panel: #21262d;
  --border: #30363d;
  --accent: #f78166;
  --accent2: #ffa657;
  --accent3: #79c0ff;
  --green: #56d364;
  --red: #f85149;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --text-dim: #484f58;
  --cell-bg: #1c2128;
  --cell-hover: #262c36;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { width: 100%; max-width: 520px; padding: 24px 16px; display: none; flex-direction: column; align-items: center; gap: 20px; }
.screen.active { display: flex; }

/* ── TITLE SCREEN ── */
.title-logo {
  text-align: center;
  margin-top: 32px;
}
.title-logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 12vw, 5rem);
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(247,129,102,0.3));
}
.title-logo .sub {
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  color: var(--text-muted);
  margin-top: 6px;
  text-transform: uppercase;
}

.section-label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  align-self: flex-start;
  padding-left: 2px;
}

/* Mode choice */
.big-choice {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
}
.big-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 24px 16px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.big-btn:hover { border-color: var(--accent); background: var(--panel); transform: translateY(-2px); box-shadow: var(--shadow); }
.big-btn.selected { border-color: var(--accent); background: rgba(247,129,102,0.1); box-shadow: 0 0 24px rgba(247,129,102,0.2); }
.big-btn .icon { font-size: 2rem; line-height: 1; }
.big-btn .label { font-size: 1rem; font-weight: 700; }
.big-btn .desc { font-size: 0.7rem; color: var(--text-muted); }

/* Range selector */
.range-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  width: 100%;
  justify-content: center;
}
.range-chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.range-chip:hover { border-color: var(--accent2); color: var(--accent2); }
.range-chip.selected { border-color: var(--accent2); background: rgba(255,166,87,0.12); color: var(--accent2); font-weight: 700; }

.start-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(247,129,102,0.3);
  -webkit-tap-highlight-color: transparent;
}
.start-btn:hover { background: #ff9070; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,129,102,0.4); }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── GAME SCREEN ── */
#screen-game { padding-top: 12px; }

.game-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 10px;
}
.back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.back-btn:hover { color: var(--text); border-color: var(--text-muted); }

.game-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex: 1;
  justify-content: center;
}
.meta-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.meta-badge.sum { background: rgba(86,211,100,0.15); color: var(--green); border: 1px solid rgba(86,211,100,0.3); }
.meta-badge.prod { background: rgba(247,129,102,0.15); color: var(--accent); border: 1px solid rgba(247,129,102,0.3); }
.meta-badge.range { background: rgba(121,192,255,0.12); color: var(--accent3); border: 1px solid rgba(121,192,255,0.25); }

.timer-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 12px;
}
.timer-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.3s;
}
.timer-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.timer-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.1em;
  color: var(--text);
  min-width: 52px;
  text-align: right;
}

/* Grid */
.grid-wrapper {
  position: relative;
  width: 100%;
  max-width: 370px;
}
.grid-aspect { aspect-ratio: 1; width: 100%; position: relative; }
.grid-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}
.grid-cells {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 3px;
}
.gcell {
  position: relative;
  background: var(--cell-bg);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.12s;
  border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.gcell:hover { background: var(--cell-hover); }
.gcell.sel { border-color: var(--accent); background: rgba(247,129,102,0.18); z-index: 3; transform: scale(1.06); }
.gcell.ok { background: rgba(86,211,100,0.12); border-color: rgba(86,211,100,0.4); }
.gcell.ng { background: rgba(248,81,73,0.15); border-color: rgba(248,81,73,0.5); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

.hint-tag {
  position: absolute;
  top: 3px; left: 3px;
  font-size: clamp(0.45rem, 1.6vw, 0.62rem);
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  z-index: 4;
  pointer-events: none;
}
.cval {
  font-size: clamp(1.1rem, 4.5vw, 1.7rem);
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
.gcell.empty .cval { visibility: hidden; }

/* Numpad */
.numpad {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}
.nkey {
  width: clamp(44px, 13vw, 60px);
  height: clamp(44px, 13vw, 60px);
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.nkey:hover, .nkey:active { background: var(--panel); border-color: var(--accent); color: var(--accent); transform: scale(1.1); }
.nkey.erase { font-size: 0.7rem; color: var(--red); border-color: rgba(248,81,73,0.4); }
.nkey.nkey-armed { border-color: var(--accent2); background: rgba(255,166,87,0.2); color: var(--accent2); box-shadow: 0 0 10px rgba(255,166,87,0.3); transform: scale(1.12); }

/* Control row */
.ctrl-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  width: 100%;
}
.cbtn {
  padding: 11px 6px;
  border-radius: 10px;
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.04em;
}
.cbtn.go { background: var(--accent); color: white; box-shadow: 0 3px 12px rgba(247,129,102,0.3); }
.cbtn.check { background: var(--accent2); color: #1a1a2e; box-shadow: 0 3px 12px rgba(255,166,87,0.25); }
.cbtn.reset { background: var(--panel); color: var(--text-muted); border: 1px solid var(--border); }
.cbtn.newpz { background: rgba(121,192,255,0.15); color: var(--accent3); border: 1px solid rgba(121,192,255,0.3); }
.cbtn:hover { opacity: 0.85; transform: translateY(-1px); }
.cbtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* Result banner */
.result {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  font-weight: 700;
  font-size: 0.95rem;
  display: none;
  animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
}
.result.show { display: block; }
.result.ok-res { background: rgba(86,211,100,0.1); border: 1px solid rgba(86,211,100,0.4); color: var(--green); }
.result.ng-res { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.35); color: var(--red); }
@keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

/* Score history */
.history-wrap {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
}
.history-title { font-size: 0.68rem; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 8px; }
.history-list { display: flex; flex-direction: column; gap: 4px; max-height: 130px; overflow-y: auto; }
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
  font-size: 0.78rem;
  border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.history-item .h-info { color: var(--text-muted); }
.history-item .h-time { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--accent2); }
.no-history { font-size: 0.75rem; color: var(--text-dim); text-align: center; padding: 8px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── TITLE SCREEN ── -->
<div class="screen active" id="screen-title">
  <div class="title-logo">
    <h1>無言パズル</h1>
    <div class="sub">5×5 Silent Number Puzzle</div>
  </div>

  <div class="section-label">演算を選ぶ</div>
  <div class="big-choice">
    <div class="big-btn selected" id="btn-sum" onclick="selectMode('sum')">
      <div class="icon">＋</div>
      <div class="label">足し算</div>
      <div class="desc">各グループの和</div>
    </div>
    <div class="big-btn" id="btn-prod" onclick="selectMode('prod')">
      <div class="icon">×</div>
      <div class="label">掛け算</div>
      <div class="desc">各グループの積</div>
    </div>
  </div>

  <div class="section-label">使う数字の範囲を選ぶ</div>
  <div class="range-grid" id="range-grid"></div>

  <button class="start-btn" id="btn-go" onclick="goToGame()">▶&nbsp;&nbsp;スタート</button>

  <div class="history-wrap">
    <div class="history-title">▸ RECORD</div>
    <div class="history-list" id="history-list"><div class="no-history">まだ記録なし</div></div>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div class="screen" id="screen-game">
  <!-- Top bar -->
  <div class="game-topbar">
    <button class="back-btn" onclick="backToTitle()">← もどる</button>
    <div class="game-meta">
      <span class="meta-badge sum" id="badge-mode">足し算</span>
      <span class="meta-badge range" id="badge-range">1〜5</span>
    </div>
    <div class="timer-box">
      <div class="timer-dot" id="timer-dot"></div>
      <div class="timer-val" id="timer-val">00:00</div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-wrapper">
    <div class="grid-aspect">
      <div class="grid-cells" id="grid-cells"></div>
      <svg class="grid-svg" id="grid-svg" viewBox="0 0 370 370" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>

  <!-- Numpad -->
  <div class="numpad" id="numpad"></div>

  <!-- Controls -->
  <div class="ctrl-row">
    <button class="cbtn go" id="cbtn-start" onclick="startGame()">▶ スタート</button>
    <button class="cbtn check" id="cbtn-check" onclick="checkAnswer()" disabled>✔ 正誤</button>
    <button class="cbtn reset" onclick="resetGrid()">↺ リセット</button>
  </div>
  <div class="ctrl-row" style="grid-template-columns:1fr;">
    <button class="cbtn newpz" onclick="generateNewPuzzle()">🔀 新しい問題</button>
  </div>

  <!-- Result -->
  <div class="result" id="result-banner"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let chosenMode = 'sum';          // 'sum' | 'prod'
let chosenRange = [1,2,3,4,5];  // 5 consecutive ints

let puzzle = null;   // { solution, groups, hints }
let grid = [];       // 5x5 user input
let selCell = null;  // [r,c]
let selNum = null;   // number pre-selected from numpad (null = cell-first mode)
let timerInterval = null;
let startMs = null;
let elapsed = 0;
let isRunning = false;
let records = [];    // { mode, range, time }

// ═══════════════════════════════════════════
//  RANGE OPTIONS
// ═══════════════════════════════════════════
const RANGES = [];
for (let s = 1; s <= 6; s++) {
  RANGES.push(Array.from({length:5}, (_,i) => s+i));
}

function buildRangeGrid() {
  const el = document.getElementById('range-grid');
  el.innerHTML = '';
  RANGES.forEach((r, i) => {
    const chip = document.createElement('button');
    chip.className = 'range-chip' + (i === 0 ? ' selected' : '');
    chip.textContent = `${r[0]}〜${r[4]}`;
    chip.onclick = () => {
      document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      chosenRange = r;
    };
    el.appendChild(chip);
  });
  chosenRange = RANGES[0];
}

function selectMode(m) {
  chosenMode = m;
  document.getElementById('btn-sum').classList.toggle('selected', m === 'sum');
  document.getElementById('btn-prod').classList.toggle('selected', m === 'prod');
}

// ═══════════════════════════════════════════
//  PUZZLE GENERATION
// ═══════════════════════════════════════════

/** Shuffle array in-place (Fisher-Yates) */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/** Generate a random valid 5x5 latin square using the given numbers */
function generateLatinSquare(nums) {
  // Start with a base cyclic latin square then shuffle rows, cols, and symbols
  const n = nums.length; // 5
  const base = [];
  for (let r = 0; r < n; r++) {
    base.push([]);
    for (let c = 0; c < n; c++) {
      base[r].push((r + c) % n);
    }
  }
  // Shuffle rows
  const rowPerm = shuffle([...Array(n).keys()]);
  // Shuffle cols
  const colPerm = shuffle([...Array(n).keys()]);
  // Shuffle symbols
  const symPerm = shuffle([...Array(n).keys()]);
  const sq = Array(n).fill(null).map(() => Array(n).fill(0));
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      sq[r][c] = nums[symPerm[base[rowPerm[r]][colPerm[c]]]];
    }
  }
  return sq;
}

/**
 * Partition the 5x5 grid into groups of size 1 or 2.
 * Target: exactly 3 single-cell groups (11 pairs + 3 singles = 25 cells).
 * Constraint: no two singles may be adjacent to each other.
 *
 * Strategy:
 *   1. Randomly pre-select 3 non-adjacent cells as singles.
 *   2. Greedily pair the remaining 22 cells into 11 adjacent pairs.
 *   3. Retry up to 500 times until both conditions are satisfied.
 */
function generateGroups() {
  const cells = [];
  for (let r = 0; r < 5; r++)
    for (let c = 0; c < 5; c++)
      cells.push([r, c]);

  function nbrs(r, c) {
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]
      .filter(([nr,nc]) => nr>=0 && nr<5 && nc>=0 && nc<5);
  }

  function isAdjacent(a, b) {
    return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) === 1;
  }

  for (let attempt = 0; attempt < 500; attempt++) {
    // Step 1: pick 3 non-adjacent singles
    const shuffled = shuffle([...cells]);
    const singles = [];
    for (const cell of shuffled) {
      if (singles.length === 3) break;
      if (singles.every(s => !isAdjacent(s, cell))) {
        singles.push(cell);
      }
    }
    if (singles.length < 3) continue;

    // Step 2: pair remaining 22 cells greedily
    const singleSet = new Set(singles.map(([r,c]) => `${r},${c}`));
    const remaining = shuffle(cells.filter(([r,c]) => !singleSet.has(`${r},${c}`)));
    const used = new Set([...singleSet]);
    const pairs = [];

    for (const [r, c] of remaining) {
      if (used.has(`${r},${c}`)) continue;
      const free = nbrs(r, c).filter(([nr,nc]) => !used.has(`${nr},${nc}`) && !singleSet.has(`${nr},${nc}`));
      if (free.length > 0) {
        const [nr, nc] = free[Math.floor(Math.random() * free.length)];
        pairs.push([[r,c],[nr,nc]]);
        used.add(`${r},${c}`);
        used.add(`${nr},${nc}`);
      }
    }

    // Accept only if all 22 non-single cells were paired perfectly
    if (pairs.length === 11) {
      return [...pairs, ...singles.map(s => [s])];
    }
  }

  // Fallback: just 1 single (original safe algorithm)
  const order = shuffle([...cells]);
  const used = new Set();
  const groups = [];
  for (const [r, c] of order) {
    if (used.has(`${r},${c}`)) continue;
    const free = nbrs(r, c).filter(([nr,nc]) => !used.has(`${nr},${nc}`));
    if (free.length > 0) {
      const [nr, nc] = free[0];
      groups.push([[r,c],[nr,nc]]);
      used.add(`${r},${c}`); used.add(`${nr},${nc}`);
    } else {
      groups.push([[r,c]]);
      used.add(`${r},${c}`);
    }
  }
  return groups;
}

/** Compute hint for a group given a solution and operation */
function computeHint(solution, group, isProduct) {
  if (isProduct) {
    let p = 1;
    for (const [r,c] of group) p *= solution[r][c];
    return p;
  } else {
    return group.reduce((s,[r,c]) => s + solution[r][c], 0);
  }
}

function generatePuzzle(nums, isProduct) {
  const solution = generateLatinSquare(nums);
  const groups = generateGroups();
  const hints = groups.map(g => computeHint(solution, g, isProduct));
  return { solution, groups, hints };
}

// ═══════════════════════════════════════════
//  SVG GROUP BORDERS
// ═══════════════════════════════════════════
const SVG_W = 370, SVG_H = 370;
const GAP = 3;
const CELL_W = (SVG_W - GAP * 4) / 5;
const CELL_H = (SVG_H - GAP * 4) / 5;

function cellRect(r, c) {
  return {
    x: c * (CELL_W + GAP),
    y: r * (CELL_H + GAP),
    w: CELL_W,
    h: CELL_H,
  };
}

const GROUP_PALETTE = [
  '#f78166','#ffa657','#79c0ff','#56d364','#d2a8ff',
  '#ff7b72','#ffd2a8','#a5d6ff','#aff5b4','#e8b4fb',
  '#ffb3a7','#ffc680','#b3d9ff','#c8f7c8','#f0d0ff',
];

function drawGroupBorders(groups) {
  const svg = document.getElementById('grid-svg');
  svg.innerHTML = '';

  groups.forEach((group, gi) => {
    const color = GROUP_PALETTE[gi % GROUP_PALETTE.length];
    const cellSet = new Set(group.map(([r,c]) => `${r},${c}`));
    const pad = 2.5;

    if (group.length === 1) {
      const [r,c] = group[0];
      const {x,y,w,h} = cellRect(r,c);
      const el = document.createElementNS('http://www.w3.org/2000/svg','rect');
      el.setAttribute('x', x + pad);
      el.setAttribute('y', y + pad);
      el.setAttribute('width', w - pad*2);
      el.setAttribute('height', h - pad*2);
      el.setAttribute('fill','none');
      el.setAttribute('stroke', color);
      el.setAttribute('stroke-width','2.5');
      el.setAttribute('rx','4');
      el.setAttribute('stroke-dasharray','5,3');
      svg.appendChild(el);
    } else {
      // Draw outer border segments
      const segs = [];
      for (const [r,c] of group) {
        const {x,y,w,h} = cellRect(r,c);
        const edges = [
          { side:'top',    x1:x+pad,   y1:y+pad,   x2:x+w-pad, y2:y+pad,   nr:r-1, nc:c },
          { side:'bottom', x1:x+pad,   y1:y+h-pad, x2:x+w-pad, y2:y+h-pad, nr:r+1, nc:c },
          { side:'left',   x1:x+pad,   y1:y+pad,   x2:x+pad,   y2:y+h-pad, nr:r,   nc:c-1 },
          { side:'right',  x1:x+w-pad, y1:y+pad,   x2:x+w-pad, y2:y+h-pad, nr:r,   nc:c+1 },
        ];
        for (const e of edges) {
          if (!cellSet.has(`${e.nr},${e.nc}`)) {
            segs.push(`M ${e.x1} ${e.y1} L ${e.x2} ${e.y2}`);
          }
        }
      }
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', segs.join(' '));
      path.setAttribute('fill','none');
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width','3');
      path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    }
  });
}

// ═══════════════════════════════════════════
//  GRID RENDERING
// ═══════════════════════════════════════════
function buildGrid() {
  const container = document.getElementById('grid-cells');
  container.innerHTML = '';
  grid = Array(5).fill(null).map(() => Array(5).fill(0));
  selCell = null;

  // Map top-left cell of each group to its hint
  const hintMap = {};
  puzzle.groups.forEach((group, gi) => {
    let minR = 9, minC = 9;
    for (const [r,c] of group) {
      if (r < minR || (r === minR && c < minC)) { minR=r; minC=c; }
    }
    hintMap[`${minR},${minC}`] = puzzle.hints[gi];
  });

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement('div');
      cell.className = 'gcell empty';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.tabIndex = 0;

      const key = `${r},${c}`;
      if (hintMap[key] !== undefined) {
        const tag = document.createElement('div');
        tag.className = 'hint-tag';
        tag.textContent = hintMap[key];
        cell.appendChild(tag);
      }

      const val = document.createElement('div');
      val.className = 'cval';
      val.textContent = '';
      cell.appendChild(val);

      cell.addEventListener('click', () => selectCell(r,c));
      cell.addEventListener('keydown', onCellKey);
      container.appendChild(cell);
    }
  }

  drawGroupBorders(puzzle.groups);
}

function buildNumpad() {
  const pad = document.getElementById('numpad');
  pad.innerHTML = '';
  chosenRange.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'nkey';
    btn.textContent = n;
    btn.dataset.num = n;
    btn.addEventListener('click', () => tapNum(n));
    pad.appendChild(btn);
  });
  const er = document.createElement('button');
  er.className = 'nkey erase';
  er.textContent = '消去';
  er.dataset.num = '0';
  er.addEventListener('click', () => tapNum(0));
  pad.appendChild(er);
}

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════

/** Highlight which numpad button is "armed" */
function highlightNumBtn(n) {
  document.querySelectorAll('.nkey').forEach(el => {
    const v = el.dataset.num === '0' ? 0 : parseInt(el.dataset.num);
    el.classList.toggle('nkey-armed', n !== null && v === n);
  });
}

/**
 * Called when a numpad button is tapped.
 * Always arms the number (highlights it).
 * If a cell is already selected, also writes immediately.
 */
function tapNum(n) {
  if (!isRunning) return;
  // Always arm the number
  selNum = n;
  highlightNumBtn(n);
  // If a cell is already selected, write right away too, then clear selection
  if (selCell) {
    writeToCell(selCell[0], selCell[1], n, false);  // no auto-advance in num-first
    selNum = null;
    highlightNumBtn(null);
    selCell = null;
    highlightSelected();
  }
}

/**
 * Called when a grid cell is tapped.
 * - If a number is armed → write it and disarm.
 * - Otherwise → just select the cell.
 */
function selectCell(r, c) {
  if (!isRunning) return;
  if (selNum !== null) {
    // Num-first: write armed number, then clear selCell so next tap must pick a cell again
    selCell = [r, c];
    highlightSelected();
    writeToCell(r, c, selNum, false);  // no auto-advance
    selNum = null;
    highlightNumBtn(null);
    selCell = null;   // clear selection: next interaction starts fresh
    highlightSelected();
  } else {
    // Cell-first: select
    selCell = [r, c];
    highlightSelected();
  }
}

function highlightSelected() {
  document.querySelectorAll('.gcell').forEach(el => el.classList.remove('sel'));
  if (!selCell) return;
  const el = getCell(...selCell);
  if (el) { el.classList.add('sel'); el.focus(); }
}

/** Core: write a value into a cell and update display.
 *  autoAdvance: move to next empty cell after writing (cell-first mode only)
 */
function writeToCell(r, c, n, autoAdvance = true) {
  grid[r][c] = n;
  const el = getCell(r, c);
  if (el) {
    el.querySelector('.cval').textContent = n || '';
    el.classList.toggle('empty', n === 0);
    el.classList.remove('ok', 'ng');
  }
  document.getElementById('result-banner').className = 'result';
  if (n !== 0 && autoAdvance) {
    const next = nextEmpty(r, c);
    if (next) { selCell = next; highlightSelected(); }
  }
}

function getCell(r, c) {
  return document.querySelector(`.gcell[data-r='${r}'][data-c='${c}']`);
}

function inputNum(n) {
  if (!isRunning || !selCell) return;
  writeToCell(selCell[0], selCell[1], n);
}

function nextEmpty(fromR, fromC) {
  const fi = fromR * 5 + fromC;
  for (let i = fi + 1; i < 25; i++) {
    const r = Math.floor(i/5), c = i%5;
    if (grid[r][c] === 0) return [r,c];
  }
  for (let i = 0; i < fi; i++) {
    const r = Math.floor(i/5), c = i%5;
    if (grid[r][c] === 0) return [r,c];
  }
  return null;
}

function onCellKey(e) {
  if (!isRunning) return;
  const r = parseInt(e.target.dataset.r);
  const c = parseInt(e.target.dataset.c);
  const num = parseInt(e.key);
  if (!isNaN(num) && chosenRange.includes(num)) {
    e.preventDefault();
    selCell = [r,c];
    inputNum(num);
    return;
  }
  if (e.key === 'Backspace' || e.key === 'Delete') { selCell=[r,c]; inputNum(0); return; }
  const move = {ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1],Tab:[0,1]};
  if (move[e.key]) {
    e.preventDefault();
    const [dr,dc] = move[e.key];
    const nr = ((r+dr)+5)%5, nc = ((c+dc)+5)%5;
    selCell=[nr,nc];
    const el = getCell(nr,nc); if(el){el.focus();}
    selectCell(nr,nc);
  }
}

document.addEventListener('keydown', e => {
  if (!isRunning || !selCell || e.target.classList.contains('gcell')) return;
  const num = parseInt(e.key);
  if (!isNaN(num) && chosenRange.includes(num)) { e.preventDefault(); inputNum(num); }
  if (e.key === 'Backspace') inputNum(0);
});

// ═══════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════
function startTimer() {
  startMs = Date.now() - elapsed;
  document.getElementById('timer-dot').classList.add('running');
  timerInterval = setInterval(() => {
    elapsed = Date.now() - startMs;
    document.getElementById('timer-val').textContent = fmtTime(elapsed);
  }, 250);
}
function stopTimer() {
  clearInterval(timerInterval); timerInterval = null;
  document.getElementById('timer-dot').classList.remove('running');
  if (startMs) elapsed = Date.now() - startMs;
}
function resetTimer() {
  stopTimer(); elapsed = 0; startMs = null;
  document.getElementById('timer-val').textContent = '00:00';
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
//  GAME CONTROLS
// ═══════════════════════════════════════════
function startGame() {
  isRunning = true;
  resetTimer();
  startTimer();
  document.getElementById('cbtn-start').disabled = true;
  document.getElementById('cbtn-check').disabled = false;
  selectCell(0,0);
}

function checkAnswer() {
  const sol = puzzle.solution;
  let allOk = true;
  for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
    const el = getCell(r,c);
    el.classList.remove('ok','ng');
    if (grid[r][c] === 0) { allOk = false; continue; }
    if (grid[r][c] === sol[r][c]) el.classList.add('ok');
    else { el.classList.add('ng'); allOk = false; }
  }
  const rb = document.getElementById('result-banner');
  if (allOk) {
    stopTimer();
    isRunning = false;
    document.getElementById('cbtn-check').disabled = true;
    rb.className = 'result show ok-res';
    rb.textContent = `🎉 正解！　タイム：${fmtTime(elapsed)}`;
    addRecord(elapsed);
  } else {
    rb.className = 'result show ng-res';
    rb.textContent = '✗ 赤いマスを確認しよう！';
  }
}

function resetGrid() {
  grid = Array(5).fill(null).map(() => Array(5).fill(0));
  isRunning = false;
  resetTimer();
  selCell = null;
  selNum = null;
  highlightNumBtn(null);
  document.querySelectorAll('.gcell').forEach(el => {
    el.classList.remove('ok','ng','sel');
    el.classList.add('empty');
    el.querySelector('.cval').textContent = '';
  });
  document.getElementById('cbtn-start').disabled = false;
  document.getElementById('cbtn-check').disabled = true;
  document.getElementById('result-banner').className = 'result';
}

function generateNewPuzzle() {
  stopTimer();
  isRunning = false;
  elapsed = 0;
  puzzle = generatePuzzle(chosenRange, chosenMode === 'prod');
  buildGrid();
  buildNumpad();
  resetGrid();
}

// ═══════════════════════════════════════════
//  RECORDS
// ═══════════════════════════════════════════
function addRecord(ms) {
  const rangeStr = `${chosenRange[0]}〜${chosenRange[4]}`;
  const modeStr = chosenMode === 'sum' ? '足し算' : '掛け算';
  records.unshift({ mode: modeStr, range: rangeStr, time: ms });
  if (records.length > 20) records.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (records.length === 0) {
    el.innerHTML = '<div class="no-history">まだ記録なし</div>';
    return;
  }
  el.innerHTML = records.map((rec, i) =>
    `<div class="history-item">
      <span class="h-info">${i+1}. ${rec.mode}　${rec.range}</span>
      <span class="h-time">${fmtTime(rec.time)}</span>
    </div>`
  ).join('');
}

// ═══════════════════════════════════════════
//  SCREEN NAVIGATION
// ═══════════════════════════════════════════
function goToGame() {
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');

  // Update badges
  const modeLabel = chosenMode === 'sum' ? '足し算' : '掛け算';
  const badgeEl = document.getElementById('badge-mode');
  badgeEl.textContent = modeLabel;
  badgeEl.className = `meta-badge ${chosenMode === 'sum' ? 'sum' : 'prod'}`;
  document.getElementById('badge-range').textContent = `${chosenRange[0]}〜${chosenRange[4]}`;

  puzzle = generatePuzzle(chosenRange, chosenMode === 'prod');
  buildGrid();
  buildNumpad();
  resetGrid();
}

function backToTitle() {
  stopTimer();
  isRunning = false;
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-title').classList.add('active');
  renderHistory();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
buildRangeGrid();
renderHistory();
</script>
